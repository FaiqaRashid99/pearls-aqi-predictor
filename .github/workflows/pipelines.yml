name: AQI Automated Pipelines

on:
  schedule:
    - cron: '0 * * * *'    # every hour
    - cron: '0 3 * * *'    # daily at 3 AM UTC
  workflow_dispatch:

# ── THE FIX ──
permissions:
  contents: write

jobs:
  feature-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements_ci.txt

      - name: Run feature pipeline
        run: python feature_pipeline.py
        env:
          AQICN_TOKEN: ${{ secrets.AQICN_TOKEN }}
          OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}
          CITY: Islamabad
          FEATURE_STORE_PATH: feature_store

      - name: Commit new data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add feature_store/
          git diff --staged --quiet || git commit -m "ci: hourly feature update"
          git push

  training-pipeline:
    runs-on: ubuntu-latest
    # Only run this job when triggered by the 3 AM cron, not every hour
    if: github.event.schedule == '0 3 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements_ci.txt

      - name: Run training pipeline
        run: python training_pipeline.py
        env:
          AQICN_TOKEN: ${{ secrets.AQICN_TOKEN }}
          OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}
          CITY: Islamabad
          FEATURE_STORE_PATH: feature_store

      - name: Commit model artifacts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add models/
          git diff --staged --quiet || git commit -m "ci: daily model retrain"
          git push