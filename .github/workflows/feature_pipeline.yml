name: Feature Pipeline

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  feature-pipeline:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Fixes "Error: Cannot find module 'node:fs'" in some actions
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements_ci.txt

      - name: Run feature pipeline
        run: python feature_pipeline.py
        env:
          AQICN_TOKEN: ${{ secrets.AQICN_TOKEN }}
          OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}
          CITY: Islamabad
          FEATURE_STORE_PATH: feature_store
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Commit new data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add feature_store/
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "ci: hourly feature update"
          git pull origin main --rebase --strategy-option=theirs
          git push

