name: Training Pipeline

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  training-pipeline:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Fixes "Error: Cannot find module 'node:fs'" in some actions
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements_ci.txt

      - name: Run training pipeline
        run: python training_pipeline.py
        env:
          AQICN_TOKEN: ${{ secrets.AQICN_TOKEN }}
          OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}
          CITY: Islamabad
          FEATURE_STORE_PATH: feature_store
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Commit model artifacts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add models/
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "ci: daily model retrain"
          git pull origin main --strategy-option=theirs
          git push
        
      - name: Show model results
        run: |
          python -c "
          import json, os

          with open('models/model_metadata.json') as f:
              m = json.load(f)

          lines = []
          lines.append('## Model Training Results')
          lines.append('')
          lines.append('| Model | RMSE | MAE | R² |')
          lines.append('|---|---|---|---|')
          for r in m['all_results']:
              lines.append(f\"| {r['model']} | {r['rmse']} | {r['mae']} | {r['r2']} |\")

          # Add Keras separately if its metrics file exists
          keras_path = 'models/keras_metrics.json'
          if os.path.exists(keras_path):
              with open(keras_path) as f:
                  k = json.load(f)
              lines.append(f\"| Keras Neural Network | {k['rmse']} | {k['mae']} | {k['r2']} |\")

          lines.append('')
          lines.append(f\"**Best: {m['best_model']} — R²: {m['r2']}**\")

          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write('\n'.join(lines))
          "